<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <title>Monish Kumar V Portfolio</title>
  </head>
  <body>
    <!-- Prevent automatic browser jump to anchors on mobile devices by
         clearing the URL hash before the app mounts. This preserves
         deep-links on desktop while avoiding unwanted auto-scroll on mobile. -->
    <script>
      (function(){
        try {
          // Prevent browsers from restoring previous scroll positions which
          // can jump to anchors on page load. We set manual only when available.
          if (history && typeof history.scrollRestoration !== 'undefined') {
            try { history.scrollRestoration = 'manual'; } catch(e) { }
          }

          var isMobile = typeof window !== 'undefined' && window.innerWidth <= 1024;
          if (isMobile) {
            // Force viewport to the top early to avoid anchor jumps
            try { window.scrollTo(0,0); } catch(e) { }
            // If URL contains a hash, remove it without creating a history entry
            if (window.location && window.location.hash) {
              try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch(e) { }
            }
          }
        } catch(e) { /* ignore */ }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
